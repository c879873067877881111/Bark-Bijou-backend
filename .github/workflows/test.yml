name: build-test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    name: Maven build & test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: bark_bijou
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci -d bark_bijou"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      # 對齊 application.properties / spring-dotenv 期待的變數
      DB_URL: jdbc:postgresql://localhost:5432/bark_bijou
      DB_USERNAME: ci
      DB_PASSWORD: ci_password
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      # 下面三個 properties 用 ${...} 沒 default,缺值 Spring context 會炸
      JWT_SECRET: ci_jwt_secret_minimum_32_bytes_for_hs256_xxxxx
      ADMIN_PASSWORD: ci_admin_password_unused_in_tests
      # OAuth2 / Mail 在測試裡不會實際發送,給 dummy 即可
      GOOGLE_CLIENT_ID: dummy-client-id
      GOOGLE_CLIENT_SECRET: dummy-client-secret
      MAIL_USERNAME: dummy@example.com
      MAIL_PASSWORD: dummy
      OAUTH2_REDIRECT_URI: http://localhost:3000/oauth/callback

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            pg_isready -h localhost -p 5432 -U ci -d bark_bijou && exit 0
            sleep 2
          done
          echo "Postgres did not become ready" >&2
          exit 1

      - name: Initialize schema
        env:
          PGPASSWORD: ci_password
        run: psql -h localhost -U ci -d bark_bijou -f db/init.sql

      - name: Build & test
        run: ./mvnw -B -ntp clean verify

      - name: Upload surefire reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          retention-days: 7
