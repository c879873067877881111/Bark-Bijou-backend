# Test Database Configuration - PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/bark_bijou_test
spring.datasource.username=default
spring.datasource.password=postgres_password
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# MyBatis Configuration for Tests
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.cache-enabled=false
mybatis.configuration.log-impl=org.apache.ibatis.logging.nologging.NoLoggingImpl
mybatis.type-aliases-package=com.smallnine.apiserver.entity

# JWT Configuration for Tests
jwt.secret=testjwtsecretneedstobe32characters
jwt.expiration=86400000

# Logging Configuration for Tests
logging.level.com.smallnine.apiserver=WARN
logging.level.org.springframework=WARN
logging.level.org.apache.ibatis=WARN
logging.level.root=WARN